<head>

  <link rel="stylesheet" href="style.css">
  <style>
    .shop-layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; padding: 80px 40px 100px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    .sidebar { padding-right: 40px; border-right: 1px solid var(--border); padding-top: 40px; }
    .sidebar-section { margin-bottom: 40px; }
    .sidebar-title { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 3px; color: var(--white); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .sidebar-option { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; font-size: 14px; color: var(--muted); transition: color 0.2s; }
    .sidebar-option:hover { color: var(--white); }
    .sidebar-option input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
    .sidebar-option.active { color: var(--white); }
    .price-range { width: 100%; }
    .range-slider { width: 100%; accent-color: var(--accent); margin-top: 8px; }
    .price-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
    .products-area { padding-left: 40px; padding-top: 40px; }
    .products-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
    .results-count { font-size: 14px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .sort-select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; border-radius: 4px; cursor: pointer; }
    .sort-select option { background: var(--card); }
    .view-toggles { display: flex; gap: 4px; }
    .view-toggle { background: var(--dark); border: 1px solid var(--border); color: var(--muted); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; font-size: 16px; transition: all 0.2s; }
    .view-toggle.active { background: var(--accent); border-color: var(--accent); color: var(--black); }
    .pagination { display: flex; gap: 8px; margin-top: 48px; justify-content: center; }
    .page-btn { background: var(--dark); border: 1px solid var(--border); color: var(--muted); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; font-size: 14px; transition: all 0.2s; font-family: 'JetBrains Mono', monospace; }
    .page-btn.active, .page-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--black); }
    .product-rating { display: flex; gap: 2px; margin-top: 8px; }
    .star { color: var(--accent); font-size: 12px; }
    .star.empty { color: var(--border); }
    @media(max-width:900px){ .shop-layout{grid-template-columns:1fr;padding:20px;} .sidebar{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:32px;} .products-area{padding-left:0;} }
  
@media(max-width:768px){
  .shop-layout{grid-template-columns:1fr;padding:20px 16px;}
  .sidebar{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:24px;}
  .products-area{padding-left:0;padding-top:24px;}
  .products-grid{grid-template-columns:repeat(2,1fr);}
  .products-topbar{flex-direction:column;align-items:flex-start;gap:12px;}
}
@media(max-width:480px){
  .shop-layout{padding:16px;}
  .products-grid{grid-template-columns:1fr;}
  .products-topbar{gap:10px;}
  .sort-select{width:100%;}
  .view-toggles{display:none;}
  .sidebar-option{font-size:13px;}
}
</style>

let currentProducts = [...allProducts];
let currentPage = 1;
const PER_PAGE = 12;

function renderProducts(products, page = 1) {
  currentPage = page;
  const start = (page - 1) * PER_PAGE;
  const paged = products.slice(start, start + PER_PAGE);
  const grid = document.getElementById('productsGrid');
  document.getElementById('resultsCount').textContent = `Mostrando ${start + 1}–${Math.min(start + paged.length, products.length)} de ${products.length} productos`;
  grid.innerHTML = paged.map(p => `
    <div class="product-card" data-cat="${p.cat}" data-price="${p.price}" data-brand="${p.brand}">
      ${p.badge ? `<div class="product-badge${p.badgeNew?' new':''}">${p.badge}</div>` : ''}
      <div class="product-img">${p.icon}</div>
      <div class="product-info">
        <div class="product-brand">${p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-specs">${p.specs.map(s=>`<span class="spec-tag">${s}</span>`).join('')}</div>
        <div class="product-rating">${'★'.repeat(p.rating).split('').map(()=>'<span class="star">★</span>').join('')}${'★'.repeat(5-p.rating).split('').map(()=>'<span class="star empty">★</span>').join('')}</div>
        <div class="product-footer">
          <div class="product-footer-prices">
            <span class="product-price">${p.price}€</span>
            ${p.oldPrice ? `<span class="product-price-old">${p.oldPrice}€</span>` : ''}
          </div>
          <div class="product-footer-btns">
            <button class="add-btn cart-add" data-name="${p.name.replace(/"/g,'&quot;')}" data-price="${p.price}" title="Añadir al carrito">+</button>
            <button class="add-btn compare-add-btn" data-name="${p.name.replace(/"/g,'&quot;')}" data-price="${p.price}" title="Comparar">⚖</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
  // Event delegation for add buttons
  grid.querySelectorAll('.cart-add').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      addToCart(btn.dataset.name, parseFloat(btn.dataset.price));
      btn.textContent = '✓';
      btn.style.background = 'var(--accent)';
      btn.style.color = 'var(--black)';
      btn.style.borderColor = 'var(--accent)';
      setTimeout(() => { btn.textContent = '+'; btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = ''; }, 1200);
    });
  });
  renderPagination(products, page);
  grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderPagination(products, page) {
  const totalPages = Math.ceil(products.length / PER_PAGE);
  const el = document.getElementById('paginationEl');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let btns = '';
  if (page > 1) btns += `<button class="page-btn" onclick="goPage(${page-1})">←</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - page) <= 1) {
      btns += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - page) === 2) {
      btns += `<span style="color:var(--muted);padding:0 4px;align-self:center">…</span>`;
    }
  }
  if (page < totalPages) btns += `<button class="page-btn" onclick="goPage(${page+1})">→</button>`;
  el.innerHTML = btns;
}

function goPage(p) { renderProducts(currentProducts, p); }

function applyFilters() {
  const checkedCats = [...document.querySelectorAll('input[type=checkbox]')].filter(c => c.checked && ['cpu','gpu','ram','storage','monitor','peripheral','motherboard','case','psu'].includes(c.value)).map(c => c.value);
  const checkedBrands = [...document.querySelectorAll('input[type=checkbox]')].filter(c => c.checked && ['Intel','AMD','NVIDIA','ASUS','MSI','Gigabyte','Corsair','be quiet!','Lian Li','Seasonic','Samsung','Fractal','NZXT','ASRock','DeepCool','G.Skill','Kingston','WD','Seagate','Sabrent','Crucial','TeamGroup','SteelSeries','HyperX','Logitech','Razer','Elgato','Rode','LG','Acer','BenQ'].includes(c.value)).map(c => c.value);
  const maxPrice = parseInt(document.getElementById('priceRange').value);
  currentProducts = allProducts.filter(p => {
    const catOk = !checkedCats.length || checkedCats.includes(p.cat);
    const brandOk = !checkedBrands.length || checkedBrands.includes(p.brand);
    const priceOk = p.price <= maxPrice;
    return catOk && brandOk && priceOk;
  });
  renderProducts(currentProducts, 1);
}

function sortProducts(val) {
  let sorted = [...currentProducts];
  if (val === 'price-asc') sorted.sort((a,b) => a.price - b.price);
  else if (val === 'price-desc') sorted.sort((a,b) => b.price - a.price);
  else if (val === 'rating') sorted.sort((a,b) => b.rating - a.rating);
  currentProducts = sorted;
  renderProducts(currentProducts, 1);
}

function setView(type, btn) {
  document.querySelectorAll('.view-toggle').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const grid = document.getElementById('productsGrid');
  if (type === 'list') {
    grid.style.gridTemplateColumns = '1fr';
  } else {
    grid.style.gridTemplateColumns = '';
  }
}

function updatePrice(val) {
  document.getElementById('priceVal').textContent = parseInt(val).toLocaleString('es-ES') + '€';
  applyFilters();
}

function resetFilters() {
  document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
  document.getElementById('priceRange').value = 2000;
  document.getElementById('priceVal').textContent = '2.000€';
  currentProducts = [...allProducts];
  renderProducts(currentProducts, 1);
}

// Check URL params
const urlParams = new URLSearchParams(window.location.search);
const catParam = urlParams.get('cat');

// Init
renderProducts(allProducts, 1);

if (catParam) {
  const map = { procesadores:'cpu', gpus:'gpu', ram:'ram', almacenamiento:'storage', monitores:'monitor', perifericos:'peripheral', placas:'motherboard', cajas:'case', fuentes:'psu' };
  const catKey = map[catParam];
  if (catKey) {
    const cb = document.querySelector(`input[value="${catKey}"]`);
    if (cb) { cb.checked = true; applyFilters(); }
  }
}
